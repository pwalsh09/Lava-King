<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lava Realm - Page 4</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: black;
      color: white;
      font-family: 'Arial', sans-serif;
      text-align: center;
    }
    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    img {
      width: 100%;
      height: auto;
    }
    .textbox {
      position: absolute;
      bottom: 80px;
      left: 10%;
      width: 80%;
      padding: 1rem;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid #ff4500;
      border-radius: 10px;
      font-size: 1.2rem;
    }
    .next-button {
      position: absolute;
      bottom: 20px;
      right: 20px;
      padding: 0.6rem 1rem;
      background-color: #ff4500;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 0 10px #ff4500;
      transition: all 0.3s ease;
    }
    .next-button:hover {
      background-color: #ff6347;
    }
  
.home-button {
  position: absolute;
  top: 20px;
  left: 20px;
  padding: 0.4rem 1rem;
  background-color: #444;
  color: white;
  border-radius: 8px;
  text-decoration: none;
  font-size: 0.9rem;
  border: 1px solid #999;
}
.home-button:hover {
  background-color: #666;
}
</style>
            
</head>
<body>
  
<div class="page">
  <a class="home-button" href="../index.html">Home</a>
            
    <img src="page4.png" alt="">
    <div class="textbox">The Lava King turns enemies into allies.</div>
    <a class="next-button" href="index.html">Next</a>
  </div>
</body>
</html>
