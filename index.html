<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Lava King</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: black;
      text-align: center;
      font-family: Arial, sans-serif;
      color: #ffa500;
    }
    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .button-wrapper {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 80%;
    }
    .nav-button {
      padding: 1rem;
      font-size: 1.2rem;
      background-color: #ff4500;
      color: white;
      border: none;
      border-radius: 10px;
      text-decoration: none;
      box-shadow: 0 0 10px #ff4500;
      transition: background-color 0.3s;
    }
    .nav-button:hover {
      background-color: #ff6347;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="lava_king_uploaded_image.jpg" alt="Lava King">
    <div class="button-wrapper">
      <a class="nav-button" href="lore/index.html">Welcome to the Lava Realm</a>
      <a class="nav-button" href="game/index.html">Play Game</a>
    </div>
  </div>
</body>
</html>
